# NextCRM 前端 nginx 站点配置（纯前端 / SPA history 路由）
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip 压缩（首屏 echarts 较大，建议开启）
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        application/x-javascript text/xml application/xml application/xml+rss
        text/javascript image/svg+xml;

    # 带 hash 的静态资源长期强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 入口 HTML 不缓存，保证发版后立即生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA 路由回退：所有未命中文件的请求都交给 index.html（React Router 6）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 对接真实后端时取消注释（当前为纯前端 Mock，无需此段）──
    # location /api/ {
    #     proxy_pass         http://YOUR_BACKEND_HOST:8080;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }
}
